<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mcp-cli</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Space+Grotesk:wght@400;500;600&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #fafafa;
            --surface: #ffffff;
            --border: #e5e5e5;
            --text: #171717;
            --muted: #737373;
            --accent: #dc2626;
            --accent-hover: #b91c1c;
            --user-bg: #171717;
            --user-text: #fafafa;
            --code-bg: #f5f5f5;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: var(--bg);
            height: 100vh;
            display: flex;
            flex-direction: column;
            color: var(--text);
        }

        .topbar {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 20px;
            border-bottom: 1px solid var(--border);
            background: var(--surface);
        }

        .dots {
            display: flex;
            gap: 6px;
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }

        .title {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 13px;
            color: var(--muted);
            margin-left: 8px;
        }

        .terminal {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 13px;
            line-height: 1.7;
        }

        .line {
            margin-bottom: 4px;
        }

        .prompt {
            color: var(--accent);
            font-weight: 600;
        }

        .path {
            color: var(--muted);
        }

        .cmd {
            color: var(--text);
        }

        .output {
            padding: 12px 16px;
            margin: 8px 0 16px 0;
            background: var(--code-bg);
            border-left: 3px solid var(--border);
            border-radius: 0 4px 4px 0;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .output.error {
            border-left-color: var(--accent);
            color: var(--accent);
        }

        .input-line {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 16px 20px;
            border-top: 1px solid var(--border);
            background: var(--surface);
        }

        .input-line .prompt {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 13px;
        }

        #cmd {
            flex: 1;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 13px;
            border: none;
            outline: none;
            background: transparent;
            color: var(--text);
        }

        .hint {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 11px;
            color: var(--muted);
            padding: 0 20px 12px;
            background: var(--surface);
        }

        .hint kbd {
            display: inline-block;
            padding: 1px 5px;
            border: 1px solid var(--border);
            border-radius: 3px;
            font-size: 10px;
            background: var(--code-bg);
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #d4d4d4;
            border-radius: 3px;
        }
    </style>
</head>

<body>
    <div class="topbar">
        <span class="title">mcp-cli ~ localhost:5000</span>
    </div>

    <div class="terminal" id="terminal">
        <div class="line"><span class="path">~/mcp-server</span> <span class="cmd">— ready. type help</span></div>
        <div id="history"></div>
    </div>

    <div class="hint">
        <kbd>add 5 3</kbd> math &nbsp;
        <kbd>wiki python</kbd> search &nbsp;
        <kbd>page AI</kbd> read &nbsp;
        <kbd>xls data.xlsx</kbd> excel &nbsp;
        <kbd>convert 100 km mi</kbd> units
    </div>

    <div class="input-line">
        <span class="prompt">❯</span>
        <input type="text" id="cmd" placeholder="" autofocus autocomplete="off" spellcheck="false">
    </div>

    <script>
        const terminal = document.getElementById("terminal");
        const history = document.getElementById("history");
        const cmdInput = document.getElementById("cmd");

        let cmdHistory = [];
        let historyIdx = -1;

        cmdInput.addEventListener("keydown", async (e) => {
            if (e.key === "ArrowUp") {
                e.preventDefault();
                if (cmdHistory.length === 0) return;
                historyIdx = Math.max(0, (historyIdx === -1) ? cmdHistory.length - 1 : historyIdx - 1);
                cmdInput.value = cmdHistory[historyIdx];
                return;
            }
            if (e.key === "ArrowDown") {
                e.preventDefault();
                if (historyIdx === -1) return;
                historyIdx++;
                if (historyIdx >= cmdHistory.length) {
                    historyIdx = -1;
                    cmdInput.value = "";
                } else {
                    cmdInput.value = cmdHistory[historyIdx];
                }
                return;
            }
            if (e.key !== "Enter") return;

            const text = cmdInput.value.trim();
            if (!text) return;

            cmdHistory.push(text);
            historyIdx = -1;
            cmdInput.value = "";

            const entry = document.createElement("div");
            entry.style.marginBottom = "12px";
            entry.innerHTML = `<div class="line"><span class="path">~/mcp-server</span> <span class="prompt">$</span> <span class="cmd">${text}</span></div>`;

            const output = document.createElement("div");
            output.className = "output";
            output.textContent = "⏳";
            entry.appendChild(output);
            history.appendChild(entry);
            terminal.scrollTop = terminal.scrollHeight;

            try {
                const res = await fetch("/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ message: text }),
                });
                const data = await res.json();
                output.textContent = data.reply;
                if (data.reply.startsWith("Error")) output.classList.add("error");
            } catch (err) {
                output.textContent = "Error: " + err.message;
                output.classList.add("error");
            }

            terminal.scrollTop = terminal.scrollHeight;
        });
    </script>
</body>

</html>
